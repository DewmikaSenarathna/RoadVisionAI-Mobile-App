services:
  - type: web
    name: roadvisionai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: ROADVISIONAI_API_KEY
        sync: false
      - key: ROADVISIONAI_CORS_ORIGINS
        value: "*"
        sync: false
